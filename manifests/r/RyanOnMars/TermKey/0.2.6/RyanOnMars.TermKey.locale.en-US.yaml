ShortDescription: CLI encrypted storage manager for private keys and seed phrases
Description: |-
  TermKey is a local-only, encrypted TUI vault for private keys
  and seed phrases. It uses XChaCha20-Poly1305 authenticated encryption and
  Argon2id key derivation. No cloud, no network access — all data stays in
  ~/.termkey/ on your machine.
