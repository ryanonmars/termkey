name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build artifacts and validate tap access without creating a release
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: termkey-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: termkey-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: termkey-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: termkey-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build browser extension
        run: npm run build:extension

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "target/${{ matrix.target }}/release"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.asset_name }}.zip"
          $installerScript = Join-Path $env:GITHUB_WORKSPACE "apps\cli\packaging\windows\termkey.iss"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $version = $env:VERSION -replace '^v', ''
          $stagingDir = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}-bundle"
          $extensionDir = Join-Path $stagingDir "browser-extension\chrome"

          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }

          Remove-Item -Recurse -Force $stagingDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extensionDir | Out-Null

          Copy-Item (Join-Path $releaseDir "termkey.exe") $stagingDir
          Copy-Item (Join-Path $releaseDir "termkey-native-host.exe") $stagingDir
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE "apps\extension\manifest.json") (Join-Path $extensionDir "manifest.json")
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE "apps\extension\popup.html") (Join-Path $extensionDir "popup.html")
          Copy-Item -Recurse -Force (Join-Path $env:GITHUB_WORKSPACE "apps\extension\dist") (Join-Path $extensionDir "dist")
          Copy-Item -Recurse -Force (Join-Path $env:GITHUB_WORKSPACE "apps\extension\public") (Join-Path $extensionDir "public")

          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $zipPath
          & $iscc "/DAppVersion=$version" "/DSourceDir=$stagingDir" "/DOutputDir=$env:GITHUB_WORKSPACE" $installerScript

      - name: Prepare asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          release_dir="${{ github.workspace }}/target/${{ matrix.target }}/release"
          staging_dir=$(mktemp -d)
          trap 'rm -rf "$staging_dir"' EXIT

          mkdir -p "$staging_dir/browser-extension/chrome"
          cp "$release_dir/termkey" "$staging_dir/termkey"
          cp "$release_dir/termkey-native-host" "$staging_dir/termkey-native-host"
          cp "${{ github.workspace }}/apps/extension/manifest.json" "$staging_dir/browser-extension/chrome/manifest.json"
          cp "${{ github.workspace }}/apps/extension/popup.html" "$staging_dir/browser-extension/chrome/popup.html"
          cp -R "${{ github.workspace }}/apps/extension/dist" "$staging_dir/browser-extension/chrome/dist"
          cp -R "${{ github.workspace }}/apps/extension/public" "$staging_dir/browser-extension/chrome/public"

          cd "$staging_dir"
          zip -r "${{ github.workspace }}/${{ matrix.asset_name }}.zip" termkey termkey-native-host browser-extension

      - name: Prepare asset (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          release_dir="${{ github.workspace }}/target/${{ matrix.target }}/release"
          staging_dir=$(mktemp -d)
          trap 'rm -rf "$staging_dir"' EXIT

          mkdir -p "$staging_dir/browser-extension/chrome"
          cp "$release_dir/termkey" "$staging_dir/termkey"
          cp "$release_dir/termkey-native-host" "$staging_dir/termkey-native-host"
          cp "${{ github.workspace }}/apps/extension/manifest.json" "$staging_dir/browser-extension/chrome/manifest.json"
          cp "${{ github.workspace }}/apps/extension/popup.html" "$staging_dir/browser-extension/chrome/popup.html"
          cp -R "${{ github.workspace }}/apps/extension/dist" "$staging_dir/browser-extension/chrome/dist"
          cp -R "${{ github.workspace }}/apps/extension/public" "$staging_dir/browser-extension/chrome/public"

          cd "$staging_dir"
          zip -r "${{ github.workspace }}/${{ matrix.asset_name }}.zip" termkey termkey-native-host browser-extension

          VERSION_NO_V="${VERSION#v}"
          PACKAGE_NAME="${{ matrix.asset_name }}-installer"

          TERMKEY_NATIVE_HOST_BINARY="${release_dir}/termkey-native-host" \
          TERMKEY_EXTENSION_DIR="$staging_dir/browser-extension/chrome" \
          "${{ github.workspace }}/apps/cli/packaging/macos/create-pkg.sh" \
            "${{ github.workspace }}/target/${{ matrix.target }}/release/termkey" \
            "${VERSION_NO_V}" \
            "${PACKAGE_NAME}" \
            "${{ github.workspace }}"

          "${{ github.workspace }}/apps/cli/packaging/macos/create-dmg.sh" \
            "${{ github.workspace }}/${PACKAGE_NAME}.pkg" \
            "${{ matrix.asset_name }}" \
            "TermKey ${{ matrix.target }}" \
            "${{ github.workspace }}"

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.zip
            TermKey-Setup.exe

      - name: Upload artifact (Unix)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}-installer.pkg
            ${{ matrix.asset_name }}.dmg

  release:
    name: Create Release
    needs: build
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.zip
            artifacts/*/*.exe
            artifacts/*/*.pkg
            artifacts/*/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s and update formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          SHA_LINUX=$(sha256sum artifacts/termkey-linux-x86_64/termkey-linux-x86_64.zip | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum artifacts/termkey-macos-x86_64/termkey-macos-x86_64.zip | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum artifacts/termkey-macos-aarch64/termkey-macos-aarch64.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/ryanonmars/homebrew-termkey.git tap
          cd tap

          VER=${VERSION#v}

          find Formula -maxdepth 1 -type f -name '*.rb' ! -name 'termkey.rb' -exec grep -l 'github.com/ryanonmars/termkey' {} + | xargs -r rm -f

          cat > Formula/termkey.rb << EOF
          # typed: false
          # frozen_string_literal: true

          class Termkey < Formula
            desc "CLI encrypted storage for private keys and seed phrases"
            homepage "https://github.com/ryanonmars/termkey"
            version "${VER}"
            license "MIT"

            url "https://github.com/ryanonmars/termkey/releases/download/${VERSION}/termkey-linux-x86_64.zip"
            sha256 "${SHA_LINUX}"

            on_macos do
              on_intel do
                url "https://github.com/ryanonmars/termkey/releases/download/${VERSION}/termkey-macos-x86_64.zip"
                sha256 "${SHA_MACOS_X86}"
              end

              on_arm do
                url "https://github.com/ryanonmars/termkey/releases/download/${VERSION}/termkey-macos-aarch64.zip"
                sha256 "${SHA_MACOS_ARM}"
              end
            end

            def install
              bin.install "termkey"
              libexec.install "termkey-native-host"
              pkgshare.install "browser-extension"
            end

            test do
              assert_match "Encrypted storage for", shell_output("#{bin}/termkey --help")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Formula
          git commit -m "termkey ${VER}"
          git push

  validate-tap:
    name: Validate Homebrew Tap
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate tap access and formula output
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          SHA_LINUX=$(sha256sum artifacts/termkey-linux-x86_64/termkey-linux-x86_64.zip | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum artifacts/termkey-macos-x86_64/termkey-macos-x86_64.zip | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum artifacts/termkey-macos-aarch64/termkey-macos-aarch64.zip | awk '{print $1}')

          git ls-remote https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/ryanonmars/homebrew-termkey.git HEAD

          VER="0.0.0-dry-run"

          cat << EOF >> "$GITHUB_STEP_SUMMARY"
          ## Dry Run Formula Preview

          - Ref: ${REF_NAME}
          - Linux SHA256: \`${SHA_LINUX}\`
          - macOS Intel SHA256: \`${SHA_MACOS_X86}\`
          - macOS ARM SHA256: \`${SHA_MACOS_ARM}\`

          \`\`\`ruby
          class Termkey < Formula
            desc "CLI encrypted storage for private keys and seed phrases"
            homepage "https://github.com/ryanonmars/termkey"
            version "${VER}"
            license "MIT"

            url "https://github.com/ryanonmars/termkey/releases/download/v${VER}/termkey-linux-x86_64.zip"
            sha256 "${SHA_LINUX}"

            on_macos do
              on_intel do
                url "https://github.com/ryanonmars/termkey/releases/download/v${VER}/termkey-macos-x86_64.zip"
                sha256 "${SHA_MACOS_X86}"
              end

              on_arm do
                url "https://github.com/ryanonmars/termkey/releases/download/v${VER}/termkey-macos-aarch64.zip"
                sha256 "${SHA_MACOS_ARM}"
              end
            end

            def install
              bin.install "termkey"
              libexec.install "termkey-native-host"
              pkgshare.install "browser-extension"
            end
          end
          \`\`\`
          EOF
